---
name: pr

on:
  pull_request

permissions:
  contents: read

env:
  BP_VERSION: ci

jobs:
  build:
    env:
      DOCKER_REGISTRY: "ttl.sh"
      BUILD_DIR: build
    outputs:
      package: ${{ steps.setup.outputs.package }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: buildpacks/github-actions/setup-tools@v5.11.0
      - uses: buildpacks/github-actions/setup-pack@v5.11.0
      - id: setup
        shell: bash
        run: |
          DOCKER_REPO=$(uuidgen)
          PACKAGE="${{ env.DOCKER_REGISTRY }}/${DOCKER_REPO}:20m"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Generated name: ${PACKAGE}" >> $GITHUB_STEP_SUMMARY
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: build --snapshot --clean
      - run: |
          make prep \
            VERSION=${{ env.BP_VERSION }} \
            BUILD_DIR=${{ env.BUILD_DIR }}
      - run: |
          pack buildpack package \
            ${STEPS_SETUP_OUTPUTS_PACKAGE} \
            --target linux/amd64 \
            --config package.toml
        working-directory: ${{ env.BUILD_DIR }}
        env:
          STEPS_SETUP_OUTPUTS_PACKAGE: ${{ steps.setup.outputs.package }}
      - name: publish temporary image
        run: |
          docker push ${STEPS_SETUP_OUTPUTS_PACKAGE}
        env:
          STEPS_SETUP_OUTPUTS_PACKAGE: ${{ steps.setup.outputs.package }}

  smoke:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      BUILDER: paketobuildpacks/builder-jammy-base:latest
    strategy:
      matrix:
        include:
          - test: deno
            continue: false
          - test: not-deno
            continue: true
          - test: deno2-serve
            continue: false
    steps:
      - uses: actions/checkout@v6
      - uses: buildpacks/github-actions/setup-tools@v5.11.0
      - uses: buildpacks/github-actions/setup-pack@v5.11.0
      - run: docker pull ${NEEDS_BUILD_OUTPUTS_PACKAGE}
        env:
          NEEDS_BUILD_OUTPUTS_PACKAGE: ${{ needs.build.outputs.package }}
      - run: docker image ls
      - run: |
          make setup \
            builder=${{ env.BUILDER }}
      - continue-on-error: ${{ matrix.continue }}
        run: |
          make smoke-${{ matrix.test }} \
            builder=${{ env.BUILDER }} \
            buildpack=${{ needs.build.outputs.package }}
