---
name: pr

on:
  pull_request

permissions:
  contents: read

env:
  BP_VERSION: ci

jobs:
  check:
    permissions:
      security-events: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

  build:
    env:
      DOCKER_REGISTRY: "ttl.sh"
      BUILD_DIR: build
    outputs:
      package: ${{ steps.setup.outputs.package }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: buildpacks/github-actions/setup-tools@06e250da5bb4ccb9a2103719a21d2a7f2252fe83 # v5.11.0
      - uses: buildpacks/github-actions/setup-pack@06e250da5bb4ccb9a2103719a21d2a7f2252fe83 # v5.11.0
      - id: setup
        shell: bash
        run: |
          DOCKER_REPO=$(uuidgen)
          PACKAGE="${{ env.DOCKER_REGISTRY }}/${DOCKER_REPO}:20m"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Generated name: ${PACKAGE}" >> $GITHUB_STEP_SUMMARY
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: '~> v2'
          args: build --snapshot --clean
      - run: |
          make prep \
            VERSION=${{ env.BP_VERSION }} \
            BUILD_DIR=${{ env.BUILD_DIR }}
      - run: |
          pack buildpack package \
            ${PACKAGE} \
            --target linux/amd64 \
            --config package.toml
        working-directory: ${{ env.BUILD_DIR }}
        env:
          PACKAGE: ${{ steps.setup.outputs.package }}
      - name: publish temporary image
        run: |
          docker push ${PACKAGE}
        env:
          PACKAGE: ${{ steps.setup.outputs.package }}

  smoke:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      BUILDER: paketobuildpacks/builder-jammy-base:latest
    strategy:
      matrix:
        include:
          - test: deno
            continue: false
          - test: not-deno
            continue: true
          - test: deno2-serve
            continue: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: buildpacks/github-actions/setup-tools@06e250da5bb4ccb9a2103719a21d2a7f2252fe83 # v5.11.0
      - uses: buildpacks/github-actions/setup-pack@06e250da5bb4ccb9a2103719a21d2a7f2252fe83 # v5.11.0
      - run: docker pull ${PACKAGE}
        env:
          PACKAGE: ${{ needs.build.outputs.package }}
      - run: docker image ls
      - run: |
          make setup \
            builder=${{ env.BUILDER }}
      - continue-on-error: ${{ matrix.continue }}
        run: |
          make smoke-${{ matrix.test }} \
            builder=${{ env.BUILDER }} \
            buildpack=${PACKAGE}
        env:
          PACKAGE: ${{ needs.build.outputs.package }}
